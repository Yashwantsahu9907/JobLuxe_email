services:
  - type: web
    name: jobluxe-email
    env: node
    plan: free # Change to starter if you need more resources
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --dns-result-order=ipv4first
      - key: MONGODB_URI
        sync: false # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false # Set in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false # Set to your Render URL after launch
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false # Set in Render dashboard
      - key: SMTP_PASS
        sync: false # Set in Render dashboard (App Password)
